name: 幻唐志活动提醒

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '20 12 * * 1'
    - cron: '30 13 * * 1'
    - cron: '20 6 * * 2'
    - cron: '45 10 * * 2'
    - cron: '55 11 * * 2'
    - cron: '30 13 * * 2'
    - cron: '55 11 * * 3'
    - cron: '30 13 * * 3'
    - cron: '45 10 * * 4'
    - cron: '20 12 * * 4'
    - cron: '30 13 * * 4'
    - cron: '20 6 * * 5'
    - cron: '55 11 * * 5'
    - cron: '50 12 * * 5'
    - cron: '30 13 * * 5'
    - cron: '5 14 * * 5'
    - cron: '20 6 * * 6'
    - cron: '55 11 * * 6'
    - cron: '20 13 * * 6'
    - cron: '20 6 * * 0'

  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Send Reminder
        run: node 幻唐志活动提醒机器人.js
