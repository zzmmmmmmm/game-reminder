name: 幻唐志活动提醒

on:
  schedule:
    # 每天早上8:00 北京 = 00:00 UTC
    - cron: '0 0 * * *'

    # 每天17:25 帮派宴会提醒 = 09:25 UTC
    - cron: '25 9 * * *'

    # 周一: 20:25=12:25, 21:35=13:35
    - cron: '25 12 * * 1'
    - cron: '35 13 * * 1'

    # 周二: 14:25=6:25, 18:50=10:50, 20:25=12:25, 21:20=13:20, 21:35=13:35
    - cron: '25 6 * * 2'
    - cron: '50 10 * * 2'
    - cron: '25 12 * * 2'
    - cron: '20 13 * * 2'
    - cron: '35 13 * * 2'

    # 周三: 20:00=12:00, 21:35=13:35
    - cron: '0 12 * * 3'
    - cron: '35 13 * * 3'

    # 周四: 18:50=10:50, 20:25=12:25, 21:35=13:35
    - cron: '50 10 * * 4'
    - cron: '25 12 * * 4'
    - cron: '35 13 * * 4'

    # 周五: 14:25=6:25, 20:00=12:00, 20:55=12:55, 21:35=13:35, 22:10=14:10
    - cron: '25 6 * * 5'
    - cron: '0 12 * * 5'
    - cron: '55 12 * * 5'
    - cron: '35 13 * * 5'
    - cron: '10 14 * * 5'

    # 周六: 14:25=6:25, 20:00=12:00, 21:25=13:25
    - cron: '25 6 * * 6'
    - cron: '0 12 * * 6'
    - cron: '25 13 * * 6'

    # 周日: 14:25=6:25
    - cron: '25 6 * * 0'

  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Send Reminder
        run: node 幻唐志活动提醒机器人.js
