name: 幻唐志活动提醒

on:
  schedule:
    # 每天早上8:00 北京 = 00:00 UTC
    - cron: '0 0 * * *'

    # 周一: 20:20=12:20UTC, 21:30=13:30UTC
    - cron: '20 12 * * 1'
    - cron: '30 13 * * 1'

    # 周二: 14:20=6:20UTC, 18:45=10:45UTC, 19:55=11:55UTC, 21:15=13:15UTC, 21:30=13:30UTC
    - cron: '20 6 * * 2'
    - cron: '45 10 * * 2'
    - cron: '55 11 * * 2'
    - cron: '15 13 * * 2'
    - cron: '30 13 * * 2'

    # 周三: 19:55=11:55UTC, 21:30=13:30UTC
    - cron: '55 11 * * 3'
    - cron: '30 13 * * 3'

    # 周四: 18:45=10:45UTC, 19:55=11:55UTC, 21:30=13:30UTC
    - cron: '45 10 * * 4'
    - cron: '55 11 * * 4'
    - cron: '30 13 * * 4'

    # 周五: 14:20=6:20UTC, 19:55=11:55UTC, 20:50=12:50UTC, 21:30=13:30UTC, 22:05=14:05UTC
    - cron: '20 6 * * 5'
    - cron: '55 11 * * 5'
    - cron: '50 12 * * 5'
    - cron: '30 13 * * 5'
    - cron: '5 14 * * 5'

    # 周六: 14:20=6:20UTC, 19:55=11:55UTC, 21:20=13:20UTC
    - cron: '20 6 * * 6'
    - cron: '55 11 * * 6'
    - cron: '20 13 * * 6'

    # 周日: 14:20=6:20UTC
    - cron: '20 6 * * 0'

  workflow_dispatch:

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Send Reminder
        run: node 幻唐志活动提醒机器人.js
